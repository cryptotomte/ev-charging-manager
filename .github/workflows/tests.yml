name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:13 UTC — catches time-dependent test rot
    # (e.g. tests with hardcoded future dates that have since passed).
    - cron: "13 6 * * *"
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-test:
    name: Lint + pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          # uv.lock is gitignored in this repo (HACS integration, not an
          # application); without it setup-uv's default cache key can't be
          # computed. Disable cache rather than commit the lock file.
          enable-cache: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff format check
        run: uv run ruff format --check custom_components/ tests/

      - name: Ruff lint
        run: uv run ruff check custom_components/ tests/

      - name: Pytest
        run: uv run pytest tests/ -v --tb=short
